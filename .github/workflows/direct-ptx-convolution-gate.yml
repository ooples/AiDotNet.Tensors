name: Direct PTX Convolution Gate

on:
  pull_request:
    branches: [master, main]
    paths:
      - '.github/workflows/direct-ptx-convolution-gate.yml'
      - 'src/AiDotNet.Tensors/AiDotNet.Tensors.csproj'
      - 'src/AiDotNet.Tensors/Engines/DirectGpu/CUDA/Ptx/DirectPtxCubinArtifact.cs'
      - 'src/AiDotNet.Tensors/Engines/DirectGpu/CUDA/Ptx/PtxFusedConv2DNchwK1Kernel.cs'
      - 'src/AiDotNet.Tensors/Engines/DirectGpu/CUDA/Ptx/Artifacts/**'
      - 'tests/AiDotNet.Tensors.Benchmarks/DirectPtxConvolutionArtifactTool.cs'
      - 'tests/AiDotNet.Tensors.Benchmarks/DirectPtxSassAuditTool.cs'
      - 'tests/AiDotNet.Tensors.Benchmarks/Program.cs'
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/direct-ptx-convolution-gate.yml'
      - 'src/AiDotNet.Tensors/Engines/DirectGpu/CUDA/Ptx/**'
      - 'tests/AiDotNet.Tensors.Benchmarks/DirectPtxConvolutionArtifactTool.cs'
      - 'tests/AiDotNet.Tensors.Benchmarks/DirectPtxSassAuditTool.cs'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NVDISASM_VERSION: '13.3.73'
  NVDISASM_SHA256: '38b2eca90c0ffa2ce815bd392077f68b7fe94992ea0ec0f8e85df30ca01fc4e9'
  CONV_CUBIN_DIR: 'src/AiDotNet.Tensors/Engines/DirectGpu/CUDA/Ptx/Artifacts/sm86'

jobs:
  cubin-sass-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore audit target
        run: dotnet restore tests/AiDotNet.Tensors.Benchmarks/AiDotNet.Tensors.Benchmarks.csproj

      - name: Build audit target
        run: >-
          dotnet build tests/AiDotNet.Tensors.Benchmarks/AiDotNet.Tensors.Benchmarks.csproj
          --configuration Release --framework net10.0 --no-restore

      # The #841 convolution kernel is experimental-pending-evidence: it is only
      # promoted to an embedded release cubin once the GPU-window resource-and-
      # performance proof clears the >=1.10x gate. Until that cubin is committed
      # the gate is an honest HOLD; once it lands, verification is fully strict.
      - name: Detect released convolution cubin
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${CONV_CUBIN_DIR}/convolution-cubins.tsv" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Released convolution cubin present; enforcing strict PTX-identity and SASS gates."
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No released convolution cubin yet (experimental HOLD pending #841 GPU evidence). Strict verify/audit steps skipped."
          fi

      - name: Verify PTX-to-cubin content identities
        if: steps.detect.outputs.released == 'true'
        run: >-
          dotnet tests/AiDotNet.Tensors.Benchmarks/bin/Release/net10.0/AiDotNet.Tensors.Benchmarks.dll
          --verify-direct-ptx-convolution-cubins

      - name: Install pinned NVIDIA nvdisasm component
        if: steps.detect.outputs.released == 'true'
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/cuda-nvdisasm.tar.xz"
          url="https://developer.download.nvidia.com/compute/cuda/redist/cuda_nvdisasm/linux-x86_64/cuda_nvdisasm-linux-x86_64-${NVDISASM_VERSION}-archive.tar.xz"
          curl --fail --location --silent --show-error "$url" --output "$archive"
          echo "${NVDISASM_SHA256}  ${archive}" | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/cuda-nvdisasm"
          tar -xJf "$archive" -C "$RUNNER_TEMP/cuda-nvdisasm" --strip-components=1
          test -x "$RUNNER_TEMP/cuda-nvdisasm/bin/nvdisasm"

      - name: Disassemble and enforce SASS safety contract
        if: steps.detect.outputs.released == 'true'
        run: >-
          dotnet tests/AiDotNet.Tensors.Benchmarks/bin/Release/net10.0/AiDotNet.Tensors.Benchmarks.dll
          --audit-direct-ptx-convolution-sass
          "$RUNNER_TEMP/cuda-nvdisasm/bin/nvdisasm"
          "src/AiDotNet.Tensors/Engines/DirectGpu/CUDA/Ptx/Artifacts/sm86"
          "artifacts/direct-ptx/convolution/sass"

      - name: Upload exact-cubin SASS evidence
        if: steps.detect.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: direct-ptx-convolution-sm86-sass
          path: artifacts/direct-ptx/convolution/sass/
          if-no-files-found: error
          retention-days: 14
