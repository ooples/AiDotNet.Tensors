name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  COVERAGE_THRESHOLD: 3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore --framework net10.0 -p:TelemetryUrl="${{ secrets.AIDOTNET_TELEMETRY_URL }}" -p:TelemetryKey="${{ secrets.AIDOTNET_TELEMETRY_KEY }}"

    - name: Test with Coverage
      run: |
        dotnet test --configuration Release --no-build --verbosity normal --framework net10.0 \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*]AiDotNet.Tensors.Engines.DirectGpu.*,[*]AiDotNet.Tensors.Engines.Cu*,[*]AiDotNet.Tensors.Engines.ClBlast*,[*]AiDotNet.Tensors.Engines.OpenCl*"

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: |
        reportgenerator \
          -reports:"./coverage/**/coverage.cobertura.xml" \
          -targetdir:"./coverage/report" \
          -reporttypes:"Html;Cobertura;TextSummary"

    - name: Display Coverage Summary
      run: |
        if [ -f "./coverage/report/Summary.txt" ]; then
          echo "=== Code Coverage Summary ==="
          cat "./coverage/report/Summary.txt"
          echo "============================="
        fi

    - name: Check Coverage Threshold
      run: |
        COVERAGE_FILE=$(find ./coverage -name "coverage.cobertura.xml" -type f | head -1)
        if [ -z "$COVERAGE_FILE" ]; then
          echo "::error::No coverage file found!"
          exit 1
        fi

        LINE_RATE=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('$COVERAGE_FILE')
        print(float(tree.getroot().get('line-rate', '0')) * 100)
        ")
        BRANCH_RATE=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('$COVERAGE_FILE')
        print(float(tree.getroot().get('branch-rate', '0')) * 100)
        ")

        echo "Line Coverage: ${LINE_RATE}%"
        echo "Branch Coverage: ${BRANCH_RATE}%"
        echo "Required Threshold: ${COVERAGE_THRESHOLD}%"

        PASS=$(python3 -c "print('yes' if $LINE_RATE >= $COVERAGE_THRESHOLD else 'no')")
        if [ "$PASS" != "yes" ]; then
          echo "::error::Line coverage (${LINE_RATE}%) is below the required threshold (${COVERAGE_THRESHOLD}%)!"
          exit 1
        fi

        echo "Coverage check PASSED!"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: ./coverage/report/

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./coverage/**/coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore -p:TelemetryUrl="${{ secrets.AIDOTNET_TELEMETRY_URL }}" -p:TelemetryKey="${{ secrets.AIDOTNET_TELEMETRY_KEY }}"

    - name: Pack
      shell: pwsh
      run: |
        dotnet pack src/AiDotNet.Tensors/AiDotNet.Tensors.csproj --configuration Release --no-build --output ./artifacts
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        # Pack native packages (skip MoltenVK if binaries are not present)
        $nativeProjects = @(
          "src/AiDotNet.Native.OpenBLAS/AiDotNet.Native.OpenBLAS.csproj",
          "src/AiDotNet.Native.CLBlast/AiDotNet.Native.CLBlast.csproj",
          "src/AiDotNet.Native.OneDNN/AiDotNet.Native.OneDNN.csproj"
        )
        foreach ($proj in $nativeProjects) {
          if (Test-Path $proj) {
            Write-Host "Packing $proj..."
            dotnet pack $proj --configuration Release --no-build --output ./artifacts
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
        }

        # MoltenVK: only pack if all required native binaries are present for both architectures
        # Note: MoltenVK is not in the solution file, so dotnet restore/build above skips it.
        # We must restore and build it separately before packing.
        $moltenVKProj = "src/AiDotNet.Native.MoltenVK/AiDotNet.Native.MoltenVK.csproj"
        $moltenVKFiles = @(
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/libMoltenVK.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/libvulkan.1.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/MoltenVK_icd.json",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/libMoltenVK.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/libvulkan.1.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/MoltenVK_icd.json"
        )
        $allPresent = (Test-Path $moltenVKProj) -and ($moltenVKFiles | ForEach-Object { Test-Path $_ }) -notcontains $false
        if ($allPresent) {
          Write-Host "Restoring and building AiDotNet.Native.MoltenVK..."
          dotnet restore $moltenVKProj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build $moltenVKProj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Packing AiDotNet.Native.MoltenVK..."
          dotnet pack $moltenVKProj --configuration Release --no-build --output ./artifacts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        } else {
          Write-Host "Skipping AiDotNet.Native.MoltenVK - not all native binaries present"
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
