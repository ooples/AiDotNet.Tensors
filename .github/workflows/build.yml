name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  # Coverage ratchet: per-PR coverage must not drop below the stored
  # baseline (`coverage-baseline.json`) by more than COVERAGE_REGRESSION_TOLERANCE
  # percentage points. The previous fixed COVERAGE_THRESHOLD=3 was
  # performative (audit-2026-05 finding #8) — replaced with a ratchet
  # that holds the floor where current actual coverage is and lets us
  # raise it incrementally via the recorded baseline.
  COVERAGE_BASELINE_FILE: coverage-baseline.json
  COVERAGE_REGRESSION_TOLERANCE: 1.0
  COVERAGE_RATCHET_INCREMENT: 5.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build (net10.0)
      run: |
        dotnet build src/AiDotNet.Tensors/AiDotNet.Tensors.csproj --configuration Release --no-restore --framework net10.0 -p:TelemetryUrl="${{ secrets.AIDOTNET_TELEMETRY_URL }}" -p:TelemetryKey="${{ secrets.AIDOTNET_TELEMETRY_KEY }}"
        dotnet build tests/AiDotNet.Tensors.Tests/AiDotNet.Tensors.Tests.csproj --configuration Release --no-restore --framework net10.0
        dotnet build tests/AiDotNet.Tensors.Benchmarks/AiDotNet.Tensors.Benchmarks.csproj --configuration Release --no-restore

    - name: Build (net471)
      run: |
        dotnet build src/AiDotNet.Tensors/AiDotNet.Tensors.csproj --configuration Release --no-restore --framework net471 -p:TelemetryUrl="${{ secrets.AIDOTNET_TELEMETRY_URL }}" -p:TelemetryKey="${{ secrets.AIDOTNET_TELEMETRY_KEY }}"
        dotnet build tests/AiDotNet.Tensors.Tests/AiDotNet.Tensors.Tests.csproj --configuration Release --no-restore --framework net471

    - name: Test with Coverage
      run: |
        dotnet test tests/AiDotNet.Tensors.Tests/AiDotNet.Tensors.Tests.csproj --configuration Release --no-build --verbosity normal --framework net10.0 \
          --filter "Category!=Benchmark&Category!=Performance" \
          --blame-hang --blame-hang-timeout 600s --blame-crash \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*]AiDotNet.Tensors.Engines.DirectGpu.*,[*]AiDotNet.Tensors.Engines.Cu*,[*]AiDotNet.Tensors.Engines.ClBlast*,[*]AiDotNet.Tensors.Engines.OpenCl*"

    # If --blame-hang-timeout (a test made no progress for 300s) or --blame-crash (test host
    # native-crashed, e.g. a CUDA-finalizer 0xC0000005) fired, the hang/crash dump + the
    # Sequence_*.xml naming the culprit test land under ./coverage. Upload them so the
    # intermittent deadlock can be diagnosed instead of the run silently stalling for hours.
    - name: Upload hang/crash dumps
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: blame-dumps
        path: |
          ./coverage/**/*.dmp
          ./coverage/**/Sequence_*.xml
        if-no-files-found: ignore

    - name: Test enterprise license validator
      run: dotnet test build/LicenseValidator.Tests/AiDotNet.Tensors.LicenseValidator.Tests.csproj --configuration Release --verbosity normal

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: |
        reportgenerator \
          -reports:"./coverage/**/coverage.cobertura.xml" \
          -targetdir:"./coverage/report" \
          -reporttypes:"Html;Cobertura;TextSummary"

    - name: Display Coverage Summary
      run: |
        if [ -f "./coverage/report/Summary.txt" ]; then
          echo "=== Code Coverage Summary ==="
          cat "./coverage/report/Summary.txt"
          echo "============================="
        fi

    - name: Check Coverage Ratchet
      run: |
        # Coverage ratchet — replaces the prior fixed COVERAGE_THRESHOLD=3
        # gate per audit-2026-05 finding #8.
        #
        # Behaviour:
        #   1. Read current line / branch coverage from cobertura XML.
        #   2. Read stored baseline from $COVERAGE_BASELINE_FILE at repo root
        #      (JSON with keys: line, branch, recorded_at, recorded_sha).
        #      If the file is missing, treat the current measurement as the
        #      initial baseline and pass (lets us bootstrap on first PR).
        #   3. Fail if current line coverage drops below
        #      (baseline_line - COVERAGE_REGRESSION_TOLERANCE).
        #   4. Print whether the PR met the +COVERAGE_RATCHET_INCREMENT target
        #      (informational only — does NOT fail; baseline must be advanced
        #      explicitly via a separate PR that updates the file).
        COVERAGE_FILE=$(find ./coverage -name "coverage.cobertura.xml" -type f | head -1)
        if [ -z "$COVERAGE_FILE" ]; then
          echo "::error::No coverage file found!"
          exit 1
        fi

        LINE_RATE=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('$COVERAGE_FILE')
        print(float(tree.getroot().get('line-rate', '0')) * 100)
        ")
        BRANCH_RATE=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('$COVERAGE_FILE')
        print(float(tree.getroot().get('branch-rate', '0')) * 100)
        ")

        echo "Line Coverage:   ${LINE_RATE}%"
        echo "Branch Coverage: ${BRANCH_RATE}%"

        if [ ! -f "$COVERAGE_BASELINE_FILE" ]; then
          echo "::warning::No $COVERAGE_BASELINE_FILE found at repo root. Treating current coverage as initial baseline."
          echo "Bootstrap baseline: line=${LINE_RATE}% branch=${BRANCH_RATE}%"
          echo "To record this baseline, commit a $COVERAGE_BASELINE_FILE with:"
          echo "  {\"line\": ${LINE_RATE}, \"branch\": ${BRANCH_RATE}, \"recorded_at\": \"$(date -u +%Y-%m-%d)\", \"recorded_sha\": \"$GITHUB_SHA\"}"
          exit 0
        fi

        # Bootstrap-mode detection: a baseline file that is a placeholder (e.g.,
        # the audit-phase0 stub with line=0, branch=0, recorded_sha="pending-...")
        # must NOT enforce the ratchet — line=0 means everything passes the
        # "current < baseline - tolerance" check. CodeRabbit (PR #438) flagged
        # this as a silent gate disablement. Detect via the
        # `_initial_value_pending` marker key OR a `recorded_sha` that starts
        # with `pending-`. When either is true, treat the run as bootstrap and
        # print the measured numbers for the human to record in a follow-up PR.
        BASELINE_PENDING=$(python3 -c "
        import json
        with open('$COVERAGE_BASELINE_FILE') as f:
            data = json.load(f)
        sha = str(data.get('recorded_sha', ''))
        pending = bool(data.get('_initial_value_pending')) or sha.startswith('pending-')
        print('yes' if pending else 'no')
        ")
        if [ "$BASELINE_PENDING" = "yes" ]; then
          echo "::warning::$COVERAGE_BASELINE_FILE is in bootstrap state (placeholder values; _initial_value_pending set or recorded_sha begins with 'pending-'). Ratchet enforcement skipped for this run."
          echo "Measured this run: line=${LINE_RATE}% branch=${BRANCH_RATE}%"
          echo "Update $COVERAGE_BASELINE_FILE in a dedicated follow-up PR with:"
          echo "  {\"line\": ${LINE_RATE}, \"branch\": ${BRANCH_RATE}, \"recorded_at\": \"$(date -u +%Y-%m-%d)\", \"recorded_sha\": \"$GITHUB_SHA\"}"
          exit 0
        fi

        BASELINE_LINE=$(python3 -c "
        import json
        with open('$COVERAGE_BASELINE_FILE') as f:
            print(json.load(f)['line'])
        ")
        BASELINE_BRANCH=$(python3 -c "
        import json
        with open('$COVERAGE_BASELINE_FILE') as f:
            print(json.load(f).get('branch', 0))
        ")

        echo "Baseline Line:   ${BASELINE_LINE}%"
        echo "Baseline Branch: ${BASELINE_BRANCH}%"
        echo "Regression tolerance: ${COVERAGE_REGRESSION_TOLERANCE}pp"
        echo "Ratchet target:       baseline + ${COVERAGE_RATCHET_INCREMENT}pp"

        FAIL_LINE=$(python3 -c "
        baseline = float('$BASELINE_LINE')
        current = float('$LINE_RATE')
        tolerance = float('$COVERAGE_REGRESSION_TOLERANCE')
        print('yes' if current < baseline - tolerance else 'no')
        ")
        if [ "$FAIL_LINE" = "yes" ]; then
          echo "::error::Line coverage (${LINE_RATE}%) regressed from baseline (${BASELINE_LINE}%) by more than ${COVERAGE_REGRESSION_TOLERANCE}pp. Either restore coverage or update $COVERAGE_BASELINE_FILE in a separate dedicated PR."
          exit 1
        fi

        AT_TARGET=$(python3 -c "
        baseline = float('$BASELINE_LINE')
        current = float('$LINE_RATE')
        target = float('$COVERAGE_RATCHET_INCREMENT')
        print('yes' if current >= baseline + target else 'no')
        ")
        if [ "$AT_TARGET" = "yes" ]; then
          echo "::notice::Coverage advanced ${COVERAGE_RATCHET_INCREMENT}pp+ over baseline. Consider updating $COVERAGE_BASELINE_FILE to ratchet the floor up."
        fi

        echo "Coverage ratchet PASSED!"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: ./coverage/report/

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./coverage/**/coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # AVX-512 machine-code microkernel verification (#409). The EVEX kernels are
  # encoding-verified (capstone disassembly) but need AVX-512 hardware to verify the
  # numerical result. Standard GitHub Linux runners are AMD (no AVX-512), so this job
  # defaults to ubuntu-latest where the Avx512F-gated kernel tests SKIP (harmless — it
  # still exercises the AVX2/SysV machine kernels on Linux). To get real AVX-512
  # verification, set the repo variable AVX512_RUNNER to an AVX-512-capable runner
  # label (a GitHub larger runner or a self-hosted box); the gated tests then execute
  # and assert bit-exactness, after which MachineKernelGemm.EnableAvx512 can be
  # flipped on by default.
  avx512-verify:
    runs-on: ${{ vars.AVX512_RUNNER || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Report CPU AVX-512 capability
      run: |
        if lscpu | grep -qiw avx512f; then
          echo "AVX-512 present — AVX-512 kernel tests WILL execute and verify.";
        else
          echo "::warning::Runner lacks AVX-512; AVX-512 kernel tests SKIP. Set repo variable AVX512_RUNNER to an AVX-512 runner to verify (#409).";
        fi

    - name: Build tests (net10.0)
      run: dotnet build tests/AiDotNet.Tensors.Tests/AiDotNet.Tensors.Tests.csproj --configuration Release --framework net10.0

    - name: Run machine-kernel tests (AVX-512 gated tests run only on AVX-512 hardware)
      run: |
        dotnet test tests/AiDotNet.Tensors.Tests/AiDotNet.Tensors.Tests.csproj --configuration Release --no-build --framework net10.0 \
          --filter "FullyQualifiedName~MachineCodeKernelTests|FullyQualifiedName~MachineKernelGemmTests|FullyQualifiedName~MicrokernelCorrectnessTests|FullyQualifiedName~Avx512"

    # Sub-S (#409) S.4: VERIFY the AVX-512 microkernels under Intel SDE emulation.
    # SDE emulates AVX-512 on ANY x86-64 host (incl. the AMD ubuntu-latest runner), and
    # on Linux .NET's Avx512F.IsSupported is satisfied under it — so this checks the
    # Avx512Fp32_16x16 / Avx512Fp32_8x32 / Avx512Fp64_8x16 kernels against a scalar
    # reference with NO AVX-512 hardware required. --verify-microkernels exits non-zero on
    # any mismatch, so a wrong AVX-512 kernel fails the job (this is the real correctness
    # gate the skipped hardware tests could not provide).
    - name: Verify AVX-512 microkernels under Intel SDE emulation
      run: |
        set -uo pipefail
        # The native --verify-microkernels run is the HARD gate (always runs, exits
        # non-zero on any microkernel mismatch). The SDE-emulated AVX-512 run is
        # best-effort: Intel rotates the downloadmirror URLs frequently and a broken
        # link must NOT block every PR. If the SDE download/extract fails (or the body
        # isn't a valid tarball — a redirect HTML page returns 200), warn and skip.
        dotnet build tests/AiDotNet.Tensors.Benchmarks/AiDotNet.Tensors.Benchmarks.csproj --configuration Release --framework net10.0
        DLL="tests/AiDotNet.Tensors.Benchmarks/bin/Release/net10.0/AiDotNet.Tensors.Benchmarks.dll"
        echo "Native run (no SDE): the AVX-512 kernels SKIP on a non-AVX-512 host —"
        dotnet "$DLL" --verify-microkernels

        SDE_DIR="$RUNNER_TEMP/sde"
        SDE_TAR="$RUNNER_TEMP/sde.tar.xz"
        mkdir -p "$SDE_DIR"
        # Try mirrors in order; first one that yields a valid .tar.xz with sde64 wins.
        SDE_URLS="https://downloadmirror.intel.com/843185/sde-external-9.48.0-2024-11-25-lin.tar.xz https://downloadmirror.intel.com/788820/sde-external-9.33.0-2024-01-07-lin.tar.xz"
        SDE_OK=0
        for url in $SDE_URLS; do
          echo "Fetching Intel SDE: $url"
          if curl -fsSL --retry 3 --retry-delay 5 "$url" -o "$SDE_TAR" \
             && tar -tJf "$SDE_TAR" >/dev/null 2>&1 \
             && tar -xf "$SDE_TAR" -C "$SDE_DIR" --strip-components=1 \
             && [ -x "$SDE_DIR/sde64" ]; then
            SDE_OK=1; break
          fi
          echo "  ... that mirror did not yield a usable SDE; trying the next."
        done
        if [ "$SDE_OK" = "1" ]; then
          echo "Under Intel SDE (-spr, emulates Sapphire Rapids AVX-512):"
          "$SDE_DIR/sde64" -spr -- dotnet "$DLL" --verify-microkernels
        else
          echo "::warning::Intel SDE download/extract failed for all mirrors (Intel rotated the URL). Skipping the SDE-emulated AVX-512 verification — the native --verify-microkernels above still ran. Update SDE_URLS in .github/workflows/build.yml with a current mirror link to re-enable it."
        fi

    # Sub-S (#409) S.4: report the per-microkernel GFLOPS (% of a measured register-FMA
    # ceiling) on this runner. On a real AVX-512 runner this prints the Avx512Fp32_16x16 /
    # 8x32 / Avx512Fp64_8x16 numbers we cannot measure on AVX2-only dev boxes (SDE GFLOPS
    # are emulation speed, not meaningful — perf still needs an AVX-512 runner via
    # AVX512_RUNNER). Informational (does not fail the job); read the values in the log.
    - name: Microkernel GFLOPS report (AVX-512 numbers on AVX-512 runners)
      continue-on-error: true
      run: dotnet run --project tests/AiDotNet.Tensors.Benchmarks --configuration Release --framework net10.0 -- --microkernel-gflops

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore -p:TelemetryUrl="${{ secrets.AIDOTNET_TELEMETRY_URL }}" -p:TelemetryKey="${{ secrets.AIDOTNET_TELEMETRY_KEY }}"

    - name: Pack
      shell: pwsh
      run: |
        dotnet pack src/AiDotNet.Tensors/AiDotNet.Tensors.csproj --configuration Release --no-build --output ./artifacts
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        # Pack native packages (skip MoltenVK if binaries are not present)
        $nativeProjects = @(
          "src/AiDotNet.Native.OpenBLAS/AiDotNet.Native.OpenBLAS.csproj",
          "src/AiDotNet.Native.CLBlast/AiDotNet.Native.CLBlast.csproj",
          "src/AiDotNet.Native.OneDNN/AiDotNet.Native.OneDNN.csproj",
          "src/AiDotNet.Native.ROCm/AiDotNet.Native.ROCm.csproj"
        )
        foreach ($proj in $nativeProjects) {
          if (Test-Path $proj) {
            Write-Host "Packing $proj..."
            dotnet pack $proj --configuration Release --no-build --output ./artifacts
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
        }

        # MoltenVK: only pack if all required native binaries are present for both architectures
        # Note: MoltenVK is not in the solution file, so dotnet restore/build above skips it.
        # We must restore and build it separately before packing.
        $moltenVKProj = "src/AiDotNet.Native.MoltenVK/AiDotNet.Native.MoltenVK.csproj"
        $moltenVKFiles = @(
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/libMoltenVK.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/libvulkan.1.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/MoltenVK_icd.json",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/libMoltenVK.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/libvulkan.1.dylib",
          "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/MoltenVK_icd.json"
        )
        $allPresent = (Test-Path $moltenVKProj) -and ($moltenVKFiles | ForEach-Object { Test-Path $_ }) -notcontains $false
        if ($allPresent) {
          Write-Host "Restoring and building AiDotNet.Native.MoltenVK..."
          dotnet restore $moltenVKProj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build $moltenVKProj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Packing AiDotNet.Native.MoltenVK..."
          dotnet pack $moltenVKProj --configuration Release --no-build --output ./artifacts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        } else {
          Write-Host "Skipping AiDotNet.Native.MoltenVK - not all native binaries present"
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
