name: Automated Release Pipeline

on:
  # Publishing is driven by release-please (see release-please.yml): merging the Release PR cuts the
  # tag + GitHub release, which fires this. This replaces the old per-push trigger so a burst of merged
  # PRs bundles into ONE version instead of one release per push.
  release:
    types: [published]
  # Manual fallback: build & publish an already-created tag.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build & publish (e.g. v0.102.17)'
        required: true

concurrency:
  # NEVER cancel an in-flight publish — building/packing 7 packages and pushing to NuGet must complete
  # atomically. Releases are infrequent now (only on Release-PR merge), so serialization is cheap.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  version-and-build:
    name: Version and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      package_version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.version.outputs.changelog }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Determine version from conventional commits
        id: version
        shell: bash
        run: |
          set -e

          # Release-please drives releases now: the version is simply the tag that fired this run
          # (release event) or the manual workflow_dispatch input — NOT computed from conventional
          # commits here (release-please already did that when it opened the Release PR). Publish that
          # exact version and skip the legacy computation below.
          RP_TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -n "$RP_TAG" ]; then
            VER="${RP_TAG#v}"
            echo "Publishing release tag $RP_TAG (version $VER)"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "changelog=Release $RP_TAG (see the GitHub release notes)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "=== Automated Semantic Versioning from Conventional Commits ==="

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          PATCH=${PATCH%%-*}

          echo "Parsed version: $MAJOR.$MINOR.$PATCH"

          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$LATEST_TAG..HEAD" --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges)
          fi

          echo "=== Commits since last tag ==="
          echo "$COMMITS"
          echo "==========================="

          BUMP_TYPE="none"

          # Check for breaking changes (conventional format)
          if echo "$COMMITS" | grep -iE "(BREAKING CHANGE:|BREAKING:|^[a-f0-9]+ [a-z]+(\([^)]*\))?!:)" > /dev/null; then
            BUMP_TYPE="major"
            echo "Found BREAKING CHANGE - will bump MAJOR version"
          fi

          # Check for features (conventional format: feat:)
          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ feat(\(.*\))?:" > /dev/null; then
            BUMP_TYPE="minor"
            echo "Found feat: commits - will bump MINOR version"
          fi

          # Check for fixes/refactor/perf/docs (conventional format with colon)
          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ (fix|refactor|perf|docs)(\(.*\))?:" > /dev/null; then
            BUMP_TYPE="patch"
            echo "Found fix:/refactor:/perf:/docs: commits - will bump PATCH version"
          fi

          # FALLBACK: Check for common non-conventional patterns (without colon)
          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ (add|implement|create|new) " > /dev/null; then
            BUMP_TYPE="minor"
            echo "Found Add/Implement/Create commits - will bump MINOR version"
          fi

          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ (fix|update|improve|enhance|resolve|patch|correct|repair) " > /dev/null; then
            BUMP_TYPE="patch"
            echo "Found Fix/Update/Improve commits - will bump PATCH version"
          fi

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              echo "Bumping MAJOR: $CURRENT_VERSION -> $MAJOR.$MINOR.$PATCH"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              echo "Bumping MINOR: $CURRENT_VERSION -> $MAJOR.$MINOR.$PATCH"
              ;;
            patch)
              PATCH=$((PATCH + 1))
              echo "Bumping PATCH: $CURRENT_VERSION -> $MAJOR.$MINOR.$PATCH"
              ;;
            none)
              echo "No conventional commits found, no version bump"
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              echo "changelog=No release needed - no conventional commits found" >> $GITHUB_OUTPUT
              exit 0
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          echo "=== Generating Changelog ==="
          CHANGELOG="## Changes in v$NEW_VERSION"$'\n\n'

          BREAKING=$(echo "$COMMITS" | grep -iE "BREAKING CHANGE:|BREAKING:" || true)
          if [ -n "$BREAKING" ]; then
            CHANGELOG+="### Breaking Changes"$'\n'
            while IFS= read -r line; do
              CHANGELOG+="- ${line#* }"$'\n'
            done < <(echo "$BREAKING")
            CHANGELOG+=$'\n'
          fi

          FEATURES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ feat(\(.*\))?:" || true)
          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### Features"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ feat(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$FEATURES")
            CHANGELOG+=$'\n'
          fi

          FIXES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ fix(\(.*\))?:" || true)
          if [ -n "$FIXES" ]; then
            CHANGELOG+="### Bug Fixes"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ fix(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$FIXES")
            CHANGELOG+=$'\n'
          fi

          PERF=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ perf(\(.*\))?:" || true)
          if [ -n "$PERF" ]; then
            CHANGELOG+="### Performance Improvements"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ perf(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$PERF")
            CHANGELOG+=$'\n'
          fi

          REFACTOR=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ refactor(\(.*\))?:" || true)
          if [ -n "$REFACTOR" ]; then
            CHANGELOG+="### Code Refactoring"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ refactor(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$REFACTOR")
            CHANGELOG+=$'\n'
          fi

          DOCS=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ docs(\(.*\))?:" || true)
          if [ -n "$DOCS" ]; then
            CHANGELOG+="### Documentation"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ docs(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$DOCS")
            CHANGELOG+=$'\n'
          fi

          # FALLBACK: Non-conventional commits
          NEW_FEATURES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ (add|implement|create|new) " | grep -viE "^[a-f0-9]+ (feat|fix|refactor|perf|docs)(\(.*\))?:" || true)
          if [ -n "$NEW_FEATURES" ]; then
            CHANGELOG+="### New Features"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$NEW_FEATURES")
            CHANGELOG+=$'\n'
          fi

          OTHER_FIXES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ (fix|update|improve|enhance|resolve|patch|correct|repair) " | grep -viE "^[a-f0-9]+ (feat|fix|refactor|perf|docs)(\(.*\))?:" || true)
          if [ -n "$OTHER_FIXES" ]; then
            CHANGELOG+="### Bug Fixes & Improvements"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$OTHER_FIXES")
            CHANGELOG+=$'\n'
          fi

          echo "$CHANGELOG"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT

          echo "$CHANGELOG" > /tmp/changelog.txt
          {
            echo 'changelog<<EOF'
            cat /tmp/changelog.txt
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Restore dependencies
        if: steps.version.outputs.should_release == 'true'
        run: dotnet restore

      - name: Build (both targets - validation only, no secrets)
        if: steps.version.outputs.should_release == 'true'
        run: |
          dotnet build src/AiDotNet.Tensors/AiDotNet.Tensors.csproj -c Release --no-restore --framework net10.0
          dotnet build src/AiDotNet.Tensors/AiDotNet.Tensors.csproj -c Release --no-restore --framework net471

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: version-and-build
    timeout-minutes: 20
    if: needs.version-and-build.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build -c Release --no-restore -p:TelemetryUrl="${{ secrets.AIDOTNET_TELEMETRY_URL }}" -p:TelemetryKey="${{ secrets.AIDOTNET_TELEMETRY_KEY }}"

      # Obfuscation / anti-tamper integration point. Runs the obfuscator you
      # provision over the freshly-built Release DLLs BEFORE they're packed, so
      # the published assemblies are protected. This is a NO-OP until you set the
      # OBFUSCATOR_EXE repository variable (path/command of your licensed tool,
      # e.g. Eazfuscator/Dotfuscator CLI) and optional OBFUSCATOR_ARGS — so it
      # never breaks a build. See docs/enterprise/licensing-security-model.md.
      # NOTE: validate your tool against this reflection/generics-heavy library
      # in a staging release first — aggressive obfuscation can break runtime
      # behaviour. (No OSS default is wired in: ConfuserEx is unmaintained and
      # risks breaking this assembly.)
      - name: Obfuscate Release assemblies (if obfuscator configured)
        shell: pwsh
        env:
          OBFUSCATOR_EXE: ${{ vars.OBFUSCATOR_EXE }}
          OBFUSCATOR_ARGS: ${{ vars.OBFUSCATOR_ARGS }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OBFUSCATOR_EXE)) {
            Write-Host "No OBFUSCATOR_EXE configured - skipping obfuscation (assemblies will be UNobfuscated)."
            exit 0
          }
          # Wrap in @() so a single-match result is still iterable as a
          # collection (PowerShell unwraps a one-element pipeline result to
          # the scalar otherwise, and .Count then returns the byte length).
          $targets = @(Get-ChildItem -Recurse -Path src -Filter AiDotNet.Tensors.dll |
                     Where-Object { $_.FullName -match '[\\/]bin[\\/]Release[\\/]' })
          if ($targets.Count -eq 0) {
            # Fail closed: OBFUSCATOR_EXE was explicitly configured but the
            # Release glob found nothing to obfuscate. Shipping unobfuscated
            # packages from a hardening-enabled job is exactly the silent
            # weakening this guard exists to prevent.
            Write-Error "OBFUSCATOR_EXE is configured but no src/**/bin/Release/AiDotNet.Tensors.dll were found - refusing to ship unobfuscated packages."
            exit 1
          }
          foreach ($dll in $targets) {
            Write-Host "Obfuscating $($dll.FullName)..."
            & $env:OBFUSCATOR_EXE @($env:OBFUSCATOR_ARGS -split ' ' | Where-Object { $_ }) "$($dll.FullName)"
            if ($LASTEXITCODE -ne 0) { Write-Error "Obfuscation failed for $($dll.Name)"; exit $LASTEXITCODE }
          }

      - name: Pack NuGet packages
        shell: pwsh
        run: |
          $VERSION = "${{ needs.version-and-build.outputs.package_version }}"
          Write-Host "Packing version $VERSION"

          New-Item -ItemType Directory -Force -Path out | Out-Null

          # Pack main package
          if (Test-Path "src/AiDotNet.Tensors/AiDotNet.Tensors.csproj") {
            Write-Host "Packing AiDotNet.Tensors..."
            dotnet pack src/AiDotNet.Tensors/AiDotNet.Tensors.csproj -c Release -o out --no-build /p:PackageVersion=$VERSION
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          # Pack OpenBLAS native package
          if (Test-Path "src/AiDotNet.Native.OpenBLAS/AiDotNet.Native.OpenBLAS.csproj") {
            Write-Host "Packing AiDotNet.Native.OpenBLAS..."
            dotnet pack src/AiDotNet.Native.OpenBLAS/AiDotNet.Native.OpenBLAS.csproj -c Release -o out --no-build /p:PackageVersion=$VERSION
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          # Pack CLBlast native package
          if (Test-Path "src/AiDotNet.Native.CLBlast/AiDotNet.Native.CLBlast.csproj") {
            Write-Host "Packing AiDotNet.Native.CLBlast..."
            dotnet pack src/AiDotNet.Native.CLBlast/AiDotNet.Native.CLBlast.csproj -c Release -o out --no-build /p:PackageVersion=$VERSION
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          # Pack OneDNN native package
          if (Test-Path "src/AiDotNet.Native.OneDNN/AiDotNet.Native.OneDNN.csproj") {
            Write-Host "Packing AiDotNet.Native.OneDNN..."
            dotnet pack src/AiDotNet.Native.OneDNN/AiDotNet.Native.OneDNN.csproj -c Release -o out --no-build /p:PackageVersion=$VERSION
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          # Pack ROCm native package (AMD GPU: rocBLAS + hipBLAS)
          $rocmProj = "src/AiDotNet.Native.ROCm/AiDotNet.Native.ROCm.csproj"
          if ((Test-Path $rocmProj) -and (Test-Path "src/AiDotNet.Native.ROCm/runtimes/win-x64/native/rocblas.dll")) {
            Write-Host "Packing AiDotNet.Native.ROCm..."
            dotnet restore $rocmProj
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            dotnet build $rocmProj -c Release --no-restore
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            dotnet pack $rocmProj -c Release -o out --no-build /p:PackageVersion=$VERSION
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "Skipping AiDotNet.Native.ROCm - native binaries not present"
          }

          # Pack CUDA native package (NVIDIA GPU: cudart + cuBLAS + cuBLASLt + nvRTC).
          # Binaries (~770MB) are gitignored; stage them from the official NVIDIA
          # redistributable archives first. The runtime is far over nuget.org's 250 MB
          # per-package limit (cuBLAS / cuBLASLt EACH exceed it), so it is published as a
          # meta package + a set of <250 MB byte-chunk "fragment" packages that the meta's
          # build targets reassemble into the full DLLs at the consumer's build — the same
          # multi-part approach TorchSharp uses for its CUDA runtime. See
          # tools/pack-cuda-split.ps1 (round-trip validated: chunks reassemble byte-for-byte).
          $cudaNative = "src/AiDotNet.Native.CUDA/runtimes/win-x64/native"
          if (Test-Path "src/AiDotNet.Native.CUDA/AiDotNet.Native.CUDA.csproj") {
            Write-Host "Staging CUDA runtime from NVIDIA redist..."
            pwsh ./tools/stage-cuda-redist.ps1
            if ((Test-Path "$cudaNative/cudart64_12.dll") -and (Test-Path "$cudaNative/nvrtc64_120_0.dll")) {
              Write-Host "Packing AiDotNet.Native.CUDA (split into <250MB fragment packages)..."
              pwsh ./tools/pack-cuda-split.ps1 -Version $VERSION -OutDir out
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            } else {
              Write-Host "Skipping AiDotNet.Native.CUDA - staging did not produce the required runtime DLLs"
            }
          }

          # Pack MoltenVK native package (Vulkan on macOS via Metal translation)
          # Only pack if all required native binaries are present for both architectures
          # Note: MoltenVK is not in the solution file, so dotnet restore/build above skips it.
          # We must restore and build it separately before packing.
          $moltenVKProj = "src/AiDotNet.Native.MoltenVK/AiDotNet.Native.MoltenVK.csproj"
          $moltenVKFiles = @(
            "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/libMoltenVK.dylib",
            "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/libvulkan.1.dylib",
            "src/AiDotNet.Native.MoltenVK/runtimes/osx-arm64/native/MoltenVK_icd.json",
            "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/libMoltenVK.dylib",
            "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/libvulkan.1.dylib",
            "src/AiDotNet.Native.MoltenVK/runtimes/osx-x64/native/MoltenVK_icd.json"
          )
          $allPresent = (Test-Path $moltenVKProj) -and ($moltenVKFiles | ForEach-Object { Test-Path $_ }) -notcontains $false
          if ($allPresent) {
            Write-Host "Restoring and building AiDotNet.Native.MoltenVK..."
            dotnet restore $moltenVKProj
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            dotnet build $moltenVKProj -c Release --no-restore
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "Packing AiDotNet.Native.MoltenVK..."
            dotnet pack $moltenVKProj -c Release -o out --no-build /p:PackageVersion=$VERSION
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "Skipping AiDotNet.Native.MoltenVK - not all native binaries present"
          }

          # Note: CUDA package is not packed in CI because native binaries (770MB) are not in git
          # CUDA package must be built and published locally with binaries present

          Write-Host "=== Packages created ==="
          Get-ChildItem out/

      # Code-signs every .nupkg with the Ooples code-signing certificate so a
      # tampered/repacked package fails NuGet signature verification (real
      # tamper-evidence — see docs/enterprise/licensing-security-model.md). This
      # is a NO-OP when the cert secrets are absent (forks, PRs, or before the
      # cert is provisioned), so it never breaks a build. To activate, set the
      # CODE_SIGNING_CERT_BASE64 (base64 of the .pfx) and CODE_SIGNING_CERT_PASSWORD
      # repository secrets.
      - name: Sign NuGet packages (if cert configured)
        shell: pwsh
        env:
          CODE_SIGNING_CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT_BASE64 }}
          CODE_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODE_SIGNING_CERT_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:CODE_SIGNING_CERT_PASSWORD)) {
            Write-Host "Code-signing secrets are incomplete (CERT_BASE64 and/or CERT_PASSWORD missing) - skipping signing (packages will be UNSIGNED)."
            exit 0
          }
          $certPath = Join-Path ([System.IO.Path]::GetTempPath()) "aidotnet-codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:CODE_SIGNING_CERT_BASE64))
          try {
            $pkgs = Get-ChildItem out/*.nupkg
            foreach ($pkg in $pkgs) {
              Write-Host "Signing $($pkg.Name)..."
              dotnet nuget sign "$($pkg.FullName)" `
                --certificate-path $certPath `
                --certificate-password $env:CODE_SIGNING_CERT_PASSWORD `
                --timestamper "http://timestamp.digicert.com"
              if ($LASTEXITCODE -ne 0) { Write-Error "Signing failed for $($pkg.Name)"; exit $LASTEXITCODE }
            }
            Write-Host "All packages signed. Verifying..."
            foreach ($pkg in $pkgs) {
              dotnet nuget verify "$($pkg.FullName)" --all
              if ($LASTEXITCODE -ne 0) { Write-Error "Verification failed for $($pkg.Name)"; exit $LASTEXITCODE }
            }
          }
          finally {
            Remove-Item $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ github.sha }}
          path: out/*.nupkg
          if-no-files-found: error

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version-and-build, pack]
    timeout-minutes: 10
    if: needs.version-and-build.outputs.should_release == 'true'
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages-${{ github.sha }}
          path: out/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Push to NuGet
        shell: bash
        run: |
          shopt -s nullglob
          pkgs=(out/*.nupkg)

          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "Error: No .nupkg files found in out/ directory"
            exit 1
          fi

          # Every package (including the CUDA meta + its fragment packages) is now under
          # nuget.org's 250 MB limit, so push them all. --skip-duplicate keeps a re-run of
          # an already-published version green; a genuine push failure (bad API key,
          # validation, an unexpectedly over-limit package) still fails the job under
          # `bash -e`, which is what we want — a silent skip would hide a broken release.
          for pkg in "${pkgs[@]}"; do
            size=$(stat -c%s "$pkg")
            echo "Publishing $pkg to NuGet ($((size / 1024 / 1024)) MB)..."
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
            echo "Successfully published $pkg"
          done

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-and-build, publish-nuget]
    timeout-minutes: 10
    if: needs.version-and-build.outputs.should_release == 'true'
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages-${{ github.sha }}
          path: out/

      - name: List artifacts
        run: ls -lah out/

      - name: Generate package list
        id: packages
        run: |
          PKGS=""
          for pkg in out/*.nupkg; do
            name=$(basename "$pkg" | sed -E 's/\.[0-9]+\.[0-9]+\.[0-9]+.*\.nupkg$//')
            PKGS="${PKGS}- **${name}**\n"
          done
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo -e "$PKGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Attach packages to the release
        # release-please already created the GitHub release (with its bundled changelog) — that is
        # what fired this run. Just upload the built .nupkg assets to it; do NOT recreate the release
        # or overwrite its release-please-generated notes. --clobber makes re-runs idempotent.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.version-and-build.outputs.package_version }}" out/*.nupkg --clobber --repo "${{ github.repository }}"
